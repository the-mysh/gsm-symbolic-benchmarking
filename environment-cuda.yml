name: gsm-cuda

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # Core ML/DL frameworks
  - pytorch::pytorch=2.1.0
  - pytorch::torchvision=0.16.0
  - pytorch::torchaudio=2.1.0
  - pytorch::pytorch-cuda=12.1  # For CUDA 12.1 - adjust based on your GPU

  # HuggingFace ecosystem
  - transformers=4.36.0
  - datasets=2.16.0
  - tokenizers=0.15.0
  - accelerate=0.25.0

  # Scientific computing
  - numpy=1.24.3
  - pandas=2.1.4
  - scipy=1.11.4

  # Visualization
  - matplotlib=3.8.2
  - seaborn=0.13.0

  # Utilities
  - tqdm=4.66.1
  - psutil=5.9.6
  - pyyaml=6.0.1

  # Jupyter
  - jupyter=1.0.0
  - ipykernel=6.27.1
  - ipywidgets=8.1.1

  # System utilities
  - pip=23.3.2

  # Pip packages (not available in conda)
  - pip:
    # Quantization support
    - bitsandbytes==0.41.3.post2

    # Specific HF versions (if needed)
    - sentencepiece==0.1.99
    - protobuf==4.25.1

    # API clients (optional)
    - openai==1.6.1
    - anthropic==0.8.1

    # Experiment tracking (optional)
    - wandb==0.16.1
    - mlflow==2.9.2

    # Additional utilities
    - python-dotenv==1.0.0
    - regex==2023.12.25